name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.txt ./... -timeout 120s

      - name: Coverage summary
        run: go tool cover -func=coverage.txt

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: go vet
        run: go vet ./...

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dashboard unit tests
        run: make test-js

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ws dependency
        run: npm install --no-save ws
        working-directory: internal/dashboard/tests

      - name: Install rodney
        run: pip install rodney

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Dashboard E2E tests
        run: make test-e2e
